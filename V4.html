<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>字灵大冒险 - 全力进阶版</title>
    <style>
        :root {
            --primary-color: #4CAF50;
            --secondary-color: #2196F3;
            --accent-color: #673AB7;
            --bg-color: #FDFCF0;
            --card-bg: #FFFFFF;
            --text-color: #2C3E50;
        }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background-color: var(--bg-color);
            margin: 0; display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; -webkit-tap-highlight-color: transparent;
        }

        header {
            width: 100%; padding: 15px 0; text-align: center;
            background: #FFF; box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            position: sticky; top: 0; z-index: 100;
        }

        .container { flex: 1; display: flex; flex-direction: column; align-items: center; width: 95%; max-width: 600px; padding: 20px 0; }

        /* 日期选择 */
        .date-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; }
        .date-btn {
            background: var(--card-bg); padding: 20px; border-radius: 15px;
            text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            cursor: pointer; border: 2px solid transparent; font-weight: bold;
        }
        .date-btn.active { border-color: var(--secondary-color); background: #E3F2FD; }

        .mode-section { margin-top: 25px; width: 100%; display: none; flex-direction: column; gap: 12px; }

        /* 卡片设计 */
        .card {
            background: var(--card-bg); width: 100%; min-height: 280px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            border-radius: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            margin-bottom: 20px; padding: 25px; box-sizing: border-box; text-align: center;
        }

        .word-display { font-size: 3.2rem; margin: 10px 0; color: #333; }
        .pinyin-display { font-size: 1.4rem; color: var(--secondary-color); font-weight: bold; margin-bottom: 8px; }
        .meaning-display { font-size: 1.05rem; color: #666; background: #F0F7FF; padding: 12px; border-radius: 10px; line-height: 1.5; }

        .btn-main { width: 100%; padding: 16px; font-size: 1.2rem; border-radius: 30px; border: none; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-green { background: var(--primary-color); color: white; box-shadow: 0 4px 0 #388E3C; }
        .btn-blue { background: var(--secondary-color); color: white; }
        .btn-purple { background: var(--accent-color); color: white; }

        .nav-btns { display: flex; gap: 12px; width: 100%; }
        .nav-btns button { flex: 1; padding: 14px; border-radius: 12px; border: 1px solid #DDD; background: white; font-weight: bold; }

        /* 语音状态指示器 */
        .tts-status {
            display: none;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
            margin-bottom: 10px;
            transition: all 0.3s;
        }
        .tts-status.loading {
            display: flex;
            background: #FFF8E1;
            color: #F57F17;
            border: 1px solid #FFE082;
        }
        .tts-status.success {
            display: flex;
            background: #E8F5E9;
            color: #2E7D32;
            border: 1px solid #A5D6A7;
        }
        .tts-status.error {
            display: flex;
            background: #FFEBEE;
            color: #C62828;
            border: 1px solid #EF9A9A;
            cursor: pointer;
        }
        .tts-status.fallback {
            display: flex;
            background: #E3F2FD;
            color: #1565C0;
            border: 1px solid #90CAF9;
        }

        /* 播放按钮动画 */
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }
        .btn-playing {
            animation: pulse 0.8s ease-in-out infinite;
            background: #43A047 !important;
        }

        /* 加载动画 */
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .spinner {
            width: 14px; height: 14px;
            border: 2px solid currentColor;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            flex-shrink: 0;
        }

        .result-item { border-bottom: 1px solid #EEE; padding: 12px 0; display: flex; justify-content: space-between; align-items: center; }

        /* 数量选择按钮 */
        .count-btn {
            background: #FFF;
            border: 2px solid #A5D6A7;
            border-radius: 10px;
            padding: 10px 4px;
            text-align: center;
            font-size: 0.95rem;
            font-weight: bold;
            color: #388E3C;
            cursor: pointer;
            transition: 0.15s;
        }
        .count-btn:active { transform: scale(0.95); }
        .count-btn.active {
            background: var(--primary-color);
            border-color: var(--primary-color);
            color: #FFF;
            box-shadow: 0 3px 8px rgba(76,175,80,0.35);
        }
    </style>
</head>
<body>

<header id="appHeader" style="display:none;">
    <div id="progressText" style="color: #888; font-size: 0.9rem;"></div>
    <div id="viewTitle" style="font-weight: bold;"></div>
</header>

<div class="container" id="menuView">
    <h2 style="margin-bottom: 20px;">字灵大冒险</h2>
    
    <div class="date-grid" id="dateGrid"></div>

    <div class="mode-section" id="modeOptions">
        <button class="btn-main btn-blue" onclick="window.app.start('learn')">📖 看字学习模式</button>
        <button class="btn-main btn-purple" onclick="window.app.start('test')">✍️ 纯净听写模式</button>
    </div>

    <div style="width:100%; height:1px; background:#EEE; margin:25px 0;"></div>

    <!-- 全词库随机听写区域 -->
    <div style="width:100%; background:#F0FFF4; border-radius:16px; padding:18px; box-sizing:border-box; border:2px solid #C8E6C9;">
        <div style="font-weight:bold; font-size:1rem; margin-bottom:12px; color:#2E7D32;">🏆 全词库随机听写挑战</div>
        <div style="font-size:0.88rem; color:#555; margin-bottom:12px;">选择本次听写数量：</div>
        <div id="countGrid" style="display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:14px;">
            <div class="count-btn active" data-count="20" onclick="window.app.selectCount(this, 20)">20个</div>
            <div class="count-btn" data-count="30" onclick="window.app.selectCount(this, 30)">30个</div>
            <div class="count-btn" data-count="40" onclick="window.app.selectCount(this, 40)">40个</div>
            <div class="count-btn" data-count="50" onclick="window.app.selectCount(this, 50)">50个</div>
            <div class="count-btn" data-count="80" onclick="window.app.selectCount(this, 80)">80个</div>
            <div class="count-btn" data-count="100" onclick="window.app.selectCount(this, 100)">100个</div>
            <div class="count-btn" data-count="0" onclick="window.app.selectCount(this, 0)" style="grid-column:span 2;">全部</div>
        </div>
        <button class="btn-main btn-green" onclick="window.app.start('random_all')">开始听写</button>
    </div>
</div>

<div class="container" id="gameView" style="display:none;">
    <div class="card">
        <div id="learnArea">
            <p class="pinyin-display" id="pinyinShow"></p>
            <h1 class="word-display" id="wordShow"></h1>
            <div class="meaning-display" id="meaningShow"></div>
        </div>
        <div id="testArea" style="display:none;">
            <div style="font-size: 2.8rem; margin-bottom: 8px;">🎧</div>
            <p style="font-size: 0.85rem; color: #AAA; margin: 0 0 14px;">点击释义可查看提示</p>
            <div id="testMeaning"
                 onclick="window.app.toggleMeaning()"
                 style="font-size:1rem; color:#555; background:#F0F7FF; padding:12px 16px; border-radius:10px; line-height:1.6; cursor:pointer; user-select:none; transition: filter 0.3s; filter: blur(6px);"
                 title="点击显示/隐藏释义"></div>
        </div>
    </div>

    <!-- 语音状态指示器 -->
    <div id="ttsStatus" class="tts-status">
        <span id="ttsSpinner" class="spinner" style="display:none;"></span>
        <span id="ttsMsg"></span>
    </div>

    <button class="btn-main btn-green" id="playBtn" onclick="window.app.play()">🔊 播放读音</button>

    <div class="nav-btns" style="margin-top:15px;">
        <button onclick="window.app.move(-1)">上一个</button>
        <button onclick="window.app.move(1)">下一个</button>
    </div>
    
    <button onclick="location.reload()" style="margin-top:25px; background:none; border:none; color: #999; text-decoration: underline;">返回主菜单</button>
</div>

<div class="container" id="resultView" style="display:none;">
    <h3 style="color: var(--primary-color);">听写完成！请核对答案</h3>
    <div id="resultBox" style="width:100%; background:white; border-radius:15px; padding:15px;"></div>
    <button class="btn-main btn-green" style="margin-top:20px;" onclick="location.reload()">回到主页</button>
</div>

<!-- 隐藏音频播放器 -->
<audio id="player" style="display:none;" preload="none"></audio>

<script>
(function() {
    // ─────────────────────────────────────────────
    // 词库数据（从外部 vocab.json 加载）
    // ─────────────────────────────────────────────
    let vocabData = [];

    // ─────────────────────────────────────────────
    // 状态变量
    // ─────────────────────────────────────────────
    let currentList = [], idx = 0, mode = '', dayIdx = null, selectedCount = 20;
    const player = document.getElementById('player');

    // ─────────────────────────────────────────────
    // TTS 引擎：4层降级链
    // Layer 0: 本地音频文件（audio/{单词}.mp3）← 最优先
    // Layer 1: 有道词典（在线主源）
    // Layer 2: Google TTS（在线备源）
    // Layer 3: Web Speech API（终极兜底，离线可用）
    // ─────────────────────────────────────────────
    const TTS = (() => {
        // 构建本地音频路径
        const buildLocalUrl = (text) => `audio/${text}.mp3`;

        // 构建各在线源的URL
        const buildOnlineUrls = (text) => [
            // 有道词典 TTS（直接用汉字，不加包装文字）
            `https://dict.youdao.com/dictvoice?audio=${encodeURIComponent(text)}&le=zh`,
            // Google TTS（备用）
            `https://translate.google.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(text)}&tl=zh-CN&client=tw-ob`,
        ];

        // 检测 Web Speech API 可用性
        const speechSynthAvailable = () =>
            'speechSynthesis' in window && 'SpeechSynthesisUtterance' in window;

        // 获取中文语音（Web Speech API）
        let zhVoice = null;
        const getZhVoice = () => {
            if (zhVoice) return zhVoice;
            const voices = window.speechSynthesis.getVoices();
            zhVoice = voices.find(v => v.lang.startsWith('zh')) || null;
            return zhVoice;
        };

        // 用 <audio> 元素播放单个URL，返回Promise
        const tryAudioUrl = (url, timeoutMs = 6000) => {
            return new Promise((resolve, reject) => {
                // 清理旧的监听器
                const cleanup = () => {
                    clearTimeout(timer);
                    player.oncanplaythrough = null;
                    player.onerror = null;
                    player.onended = null;
                };

                const timer = setTimeout(() => {
                    cleanup();
                    player.pause();
                    reject(new Error('timeout'));
                }, timeoutMs);

                player.onerror = () => {
                    cleanup();
                    reject(new Error('audio error'));
                };

                player.oncanplaythrough = () => {
                    clearTimeout(timer);
                    player.play()
                        .then(() => {
                            player.onended = () => { cleanup(); resolve(); };
                        })
                        .catch(err => {
                            cleanup();
                            reject(err);
                        });
                };

                // 设置新src前先停止
                player.pause();
                player.src = url;
                player.load();
            });
        };

        // Web Speech API 播放，返回Promise
        const tryWebSpeech = (text) => {
            return new Promise((resolve, reject) => {
                if (!speechSynthAvailable()) {
                    reject(new Error('Web Speech API not available'));
                    return;
                }
                window.speechSynthesis.cancel(); // 取消之前的
                const utter = new SpeechSynthesisUtterance(text);
                utter.lang = 'zh-CN';
                utter.rate = 0.9;
                utter.pitch = 1;

                // 尝试使用中文语音
                const voice = getZhVoice();
                if (voice) utter.voice = voice;

                utter.onend = () => resolve();
                utter.onerror = (e) => reject(new Error('SpeechSynthesis error: ' + e.error));

                window.speechSynthesis.speak(utter);
            });
        };

        // 主播放函数，带状态回调
        const speak = async (text, onStatus) => {
            // Layer 0: 尝试本地音频文件
            onStatus('loading', '加载本地读音...');
            try {
                await tryAudioUrl(buildLocalUrl(text), 3000);
                onStatus('success', '');
                return;
            } catch (e) {
                console.warn('本地音频不可用，切换在线音源:', e.message);
            }

            // Layer 1 & 2: 尝试外部音频源
            const urls = buildOnlineUrls(text);
            for (let i = 0; i < urls.length; i++) {
                const label = i === 0 ? '正在加载读音...' : '切换备用音源...';
                onStatus('loading', label);
                try {
                    await tryAudioUrl(urls[i], 5000);
                    onStatus('success', '');
                    return;
                } catch (e) {
                    console.warn(`TTS源${i + 1}失败:`, e.message);
                }
            }

            // Layer 3: Web Speech API 兜底
            onStatus('fallback', '使用本地语音引擎...');
            try {
                await tryWebSpeech(text);
                onStatus('success', '');
            } catch (e) {
                console.error('所有TTS方案均失败:', e);
                onStatus('error', '播放失败，请点击重试');
            }
        };

        return { speak, speechSynthAvailable, getZhVoice };
    })();

    // ─────────────────────────────────────────────
    // 状态显示辅助
    // ─────────────────────────────────────────────
    const setStatus = (type, msg) => {
        const el = document.getElementById('ttsStatus');
        const spinner = document.getElementById('ttsSpinner');
        const msgEl = document.getElementById('ttsMsg');
        const btn = document.getElementById('playBtn');

        // 重置
        el.className = 'tts-status';
        spinner.style.display = 'none';

        if (!type || type === 'success') {
            el.style.display = 'none';
            btn.classList.remove('btn-playing');
            btn.textContent = '🔊 播放读音';
            return;
        }

        el.classList.add(type);
        msgEl.textContent = msg;

        if (type === 'loading' || type === 'fallback') {
            spinner.style.display = 'inline-block';
            btn.classList.add('btn-playing');
            btn.textContent = '🔊 播放中...';
        } else if (type === 'error') {
            btn.classList.remove('btn-playing');
            btn.textContent = '🔊 重试播放';
        }
    };

    // ─────────────────────────────────────────────
    // 主应用逻辑
    // ─────────────────────────────────────────────
    window.app = {
        selectCount: function(el, count) {
            selectedCount = count;
            document.querySelectorAll('.count-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
        },

        init: function() {
            // 预加载 Web Speech API 语音列表（某些浏览器需要交互后才能加载）
            if ('speechSynthesis' in window) {
                window.speechSynthesis.getVoices();
                window.speechSynthesis.addEventListener('voiceschanged', () => {
                    TTS.getZhVoice(); // 刷新语音缓存
                });
            }

            const grid = document.getElementById('dateGrid');
            vocabData.forEach((d, i) => {
                const b = document.createElement('div');
                b.className = 'date-btn';
                b.innerText = d.date;
                b.onclick = () => {
                    dayIdx = i;
                    document.querySelectorAll('.date-btn').forEach(x => x.classList.remove('active'));
                    b.classList.add('active');
                    document.getElementById('modeOptions').style.display = 'flex';
                };
                grid.appendChild(b);
            });
        },

        start: function(m) {
            mode = m;
            if (m === 'random_all') {
                const all = vocabData.flatMap(d => d.words).sort(() => Math.random() - 0.5);
                const total = all.length;
                currentList = (selectedCount > 0 && selectedCount < total) ? all.slice(0, selectedCount) : all;
                const label = selectedCount > 0 && selectedCount < total ? `随机${selectedCount}个` : `全部${total}个`;
                document.getElementById('viewTitle').innerText = `🏆 全词库挑战 · ${label}`;
            } else {
                const day = vocabData[dayIdx];
                currentList = (m === 'test') ? [...day.words].sort(() => Math.random() - 0.5) : [...day.words];
                document.getElementById('viewTitle').innerText = `${day.date} - ${m === 'learn' ? '学习' : '听写'}`;
            }
            idx = 0;
            document.getElementById('menuView').style.display = 'none';
            document.getElementById('gameView').style.display = 'flex';
            document.getElementById('appHeader').style.display = 'block';
            this.update();
        },

        update: function() {
            const item = currentList[idx];
            document.getElementById('progressText').innerText = `进度: ${idx + 1} / ${currentList.length}`;
            if (mode === 'learn') {
                document.getElementById('learnArea').style.display = 'block';
                document.getElementById('testArea').style.display = 'none';
                document.getElementById('wordShow').innerText = item.w;
                document.getElementById('pinyinShow').innerText = item.p;
                document.getElementById('meaningShow').innerText = item.m;
            } else {
                document.getElementById('learnArea').style.display = 'none';
                document.getElementById('testArea').style.display = 'block';
                // 填充释义并重置为模糊状态
                const el = document.getElementById('testMeaning');
                el.textContent = item.m;
                el.style.filter = 'blur(6px)';
                el.dataset.revealed = 'false';
            }
            setStatus(null); // 重置状态
            // 切换单词后自动播放
            setTimeout(() => this.play(), 300);
        },

        toggleMeaning: function() {
            const el = document.getElementById('testMeaning');
            const isBlurred = el.dataset.revealed !== 'true';
            el.style.filter = isBlurred ? 'none' : 'blur(6px)';
            el.dataset.revealed = isBlurred ? 'true' : 'false';
        },

        play: function() {
            const word = currentList[idx].w;
            TTS.speak(word, setStatus);
        },

        move: function(step) {
            if (idx + step >= 0 && idx + step < currentList.length) {
                idx += step;
                this.update();
            } else if (idx + step >= currentList.length && mode !== 'learn') {
                this.finish();
            }
        },

        finish: function() {
            // 停止任何正在播放的语音
            player.pause();
            if ('speechSynthesis' in window) window.speechSynthesis.cancel();

            document.getElementById('gameView').style.display = 'none';
            document.getElementById('appHeader').style.display = 'none';
            document.getElementById('resultView').style.display = 'flex';
            document.getElementById('resultBox').innerHTML = currentList.map((w, i) => `
                <div class="result-item" style="flex-direction:column; align-items:flex-start; gap:4px;">
                    <div style="display:flex; justify-content:space-between; width:100%; align-items:center;">
                        <span>${i+1}. <strong style="font-size:1.1rem;">${w.w}</strong></span>
                        <span style="color:#888; font-size:0.9rem;">${w.p}</span>
                    </div>
                    <div style="font-size:0.88rem; color:#777; background:#F7F7F7; border-radius:7px; padding:6px 10px; width:100%; box-sizing:border-box; line-height:1.5;">${w.m}</div>
                </div>`).join('');
        }
    };

    window.onload = () => {
        fetch('vocab.json')
            .then(res => {
                if (!res.ok) throw new Error('无法加载词库文件 vocab.json');
                return res.json();
            })
            .then(data => {
                vocabData = data;
                window.app.init();
            })
            .catch(err => {
                document.body.innerHTML = `<div style="padding:40px;text-align:center;color:#c00;">
                    <h2>⚠️ 词库加载失败</h2>
                    <p>${err.message}</p>
                    <p style="font-size:0.9rem;color:#888;">请确保 vocab.json 与 V3.html 在同一目录，并通过本地服务器（非直接双击）打开。</p>
                </div>`;
            });
    };
})();
</script>
</body>
</html>
